org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Windows: Pub cache thường ở ổ C:, project có thể ở ổ D: — Kotlin incremental
# báo "different roots" khi đóng cache (shared_preferences_android, …).
# Tắt incremental Kotlin để tránh Daemon compilation failed / AssertionError.
kotlin.incremental=false
